<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CredPal CRM — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E13;
    --surface:#12161D;
    --surface-2:#171C25;
    --surface-3:#1D2330;
    --border:#232935;
    --text:#E8EDF2;
    --text-dim:#8B96A5;
    --text-faint:#5A6472;
    --accent:#00D4A0;
    --accent-dim:rgba(0,212,160,0.14);
    --danger:#FF6B6B;
    --danger-dim:rgba(255,107,107,0.14);
    --purple:#7B5BF5;
    --purple-dim:rgba(123,91,245,0.14);
    --purple-glow:rgba(123,91,245,0.25);
    --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:14px; line-height:1.5;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:20px;
  }

  /* ===== Main Card ===== */
  .auth-card{
    display:grid; grid-template-columns:1fr 1fr;
    width:100%; max-width:960px; min-height:560px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
  }

  /* ===== Left Panel: Image ===== */
  .left-panel{
    position:relative; overflow:hidden;
    background:linear-gradient(180deg, #3A1F6B 0%, #1A0F33 60%, #0D0818 100%);
    display:flex; flex-direction:column; justify-content:space-between; padding:28px;
  }
  .left-panel::before{
    content:''; position:absolute; inset:0;
    background:url('rdBbW.jpg') center/cover no-repeat;
    opacity:0.55; mix-blend-mode:soft-light;
  }
  .left-panel::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(58,31,107,0.3) 0%, rgba(13,8,24,0.85) 100%);
  }
  .left-top, .left-bottom{position:relative; z-index:2;}
  .left-top{
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo{
    display:flex; align-items:center; gap:10px;
  }
  .logo-mark{
    width:32px; height:32px; border-radius:8px;
    background:var(--accent); display:flex; align-items:center; justify-content:center;
    color:#04140F; font-weight:800; font-size:13px;
  }
  .logo-text{
    font-size:15px; font-weight:700; letter-spacing:-0.3px;
  }
  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.7); font-size:12px; font-weight:500;
    padding:7px 14px; border-radius:20px; text-decoration:none;
    backdrop-filter:blur(8px); transition:all .2s;
  }
  .back-link:hover{
    background:rgba(255,255,255,0.14); color:#fff; border-color:rgba(255,255,255,0.2);
  }
  .back-link svg{width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}

  .left-bottom{
    padding-bottom:8px;
  }
  .left-tagline{
    font-size:22px; font-weight:600; line-height:1.35;
    color:#fff; text-shadow:0 2px 12px rgba(0,0,0,0.4);
    margin-bottom:16px;
  }
  .carousel-dots{
    display:flex; gap:6px;
  }
  .carousel-dot{
    width:20px; height:3px; border-radius:2px;
    background:rgba(255,255,255,0.25); transition:all .3s;
  }
  .carousel-dot.active{
    width:32px; background:rgba(255,255,255,0.9);
  }

  /* ===== Right Panel: Form ===== */
  .right-panel{
    display:flex; flex-direction:column; justify-content:center;
    padding:44px 48px; background:var(--surface);
  }
  .right-header{
    margin-bottom:28px;
  }
  .right-header h1{
    font-size:26px; font-weight:700; color:var(--text);
    margin-bottom:8px; letter-spacing:-0.3px;
  }
  .right-header p{
    font-size:13.5px; color:var(--text-dim);
  }
  .right-header a{
    color:var(--accent); text-decoration:none; font-weight:500;
    transition:opacity .15s;
  }
  .right-header a:hover{opacity:.8;}

  /* Tabs */
  .auth-tabs{
    display:flex; gap:4px;
    background:var(--surface-2); border:1px solid var(--border);
    border-radius:10px; padding:4px; margin-bottom:24px;
    width:fit-content;
  }
  .auth-tabs button{
    flex:1; background:transparent; border:none;
    color:var(--text-dim); font-size:13px; font-weight:500;
    padding:9px 22px; border-radius:7px; cursor:pointer;
    font-family:inherit; transition:all .15s;
    white-space:nowrap;
  }
  .auth-tabs button.active{
    background:var(--accent-dim); color:var(--accent);
  }
  .auth-tabs button:not(.active):hover{
    color:var(--text);
  }

  /* Forms */
  .auth-form{display:flex; flex-direction:column; gap:14px;}
  .auth-form.hidden{display:none;}

  .field-group{
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
  }
  @media (max-width:480px){ .field-group{grid-template-columns:1fr;} }

  .field label{
    display:block; font-size:12px; color:var(--text-dim);
    margin-bottom:6px; font-weight:500;
  }
  .field input, .field select{
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); padding:11px 13px; border-radius:9px;
    font-size:13.5px; font-family:inherit;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input::placeholder{color:var(--text-faint);}
  .field input:focus, .field select:focus{
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(0,212,160,0.08);
  }

  .field.password-wrap{position:relative;}
  .toggle-pw{
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text-faint);
    cursor:pointer; padding:4px; display:flex; align-items:center; justify-content:center;
    transition:color .15s;
  }
  .toggle-pw:hover{color:var(--text-dim);}
  .toggle-pw svg{width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}

  .checkbox-row{
    display:flex; align-items:center; gap:9px;
    font-size:12.5px; color:var(--text-dim);
  }
  .checkbox-row input[type="checkbox"]{
    width:16px; height:16px; accent-color:var(--accent);
    cursor:pointer;
  }
  .checkbox-row a{
    color:var(--accent); text-decoration:none; font-weight:500;
  }
  .checkbox-row a:hover{text-decoration:underline;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    background:var(--accent); color:#04140F; border:none;
    font-weight:600; font-size:14px; padding:12px 18px;
    border-radius:9px; cursor:pointer; font-family:inherit;
    transition:all .15s; width:100%; margin-top:4px;
  }
  .btn:hover{opacity:.9; transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:.5; cursor:not-allowed; transform:none;}

  .divider{
    display:flex; align-items:center; gap:14px;
    color:var(--text-faint); font-size:12px;
    margin:4px 0;
  }
  .divider::before, .divider::after{
    content:''; flex:1; height:1px; background:var(--border);
  }

  .social-row{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .social-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); font-size:13px; font-weight:500;
    padding:10px; border-radius:9px; cursor:pointer;
    font-family:inherit; transition:all .15s;
  }
  .social-btn:hover{
    background:var(--surface-3); border-color:var(--text-faint);
  }
  .social-btn svg{width:16px; height:16px; flex-shrink:0;}

  .auth-error{
    font-size:12.5px; color:var(--danger);
    background:var(--danger-dim); border:1px solid rgba(255,107,107,0.3);
    padding:10px 13px; border-radius:8px; display:none; margin-bottom:4px;
  }
  .auth-error.show{display:block;}

  .auth-hint{
    font-size:11.5px; color:var(--text-faint); line-height:1.5;
  }

  .conn-toggle{
    font-size:11.5px; color:var(--text-faint); background:none; border:none;
    margin-top:18px; text-decoration:underline; text-underline-offset:2px;
    cursor:pointer; font-family:inherit; transition:color .15s;
  }
  .conn-toggle:hover{color:var(--text-dim);}

  .conn-panel{
    display:none; margin-top:14px; padding-top:14px;
    border-top:1px solid var(--border);
  }
  .conn-panel.open{display:block;}
  .conn-panel label{
    display:block; font-size:11.5px; color:var(--text-dim); margin-bottom:6px;
  }
  .conn-panel input{
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); padding:9px 11px; border-radius:8px;
    font-size:13px; font-family:inherit; margin-bottom:8px;
  }
  .conn-panel input:focus{outline:none; border-color:var(--accent);}
  .conn-panel .btn{width:auto; padding:8px 14px; font-size:12.5px; margin-top:0;}

  /* ===== Responsive ===== */
  @media (max-width:860px){
    .auth-card{grid-template-columns:1fr; max-width:440px;}
    .left-panel{min-height:180px; padding:22px;}
    .left-tagline{font-size:18px;}
    .right-panel{padding:32px 28px;}
  }
  @media (max-width:380px){
    .right-panel{padding:24px 20px;}
    .auth-tabs button{padding:8px 14px; font-size:12px;}
  }
</style>
<base target="_blank">
</head>
<body>

<div class="auth-card">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="left-top">
      <div class="logo">
        <div class="logo-mark">CP</div>
        <span class="logo-text">CredPal</span>
      </div>
      <a href="#" class="back-link">
        <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to website
      </a>
    </div>
    <div class="left-bottom">
      <div class="left-tagline">
        Capturing Moments,<br>Creating Memories
      </div>
      <div class="carousel-dots">
        <div class="carousel-dot"></div>
        <div class="carousel-dot"></div>
        <div class="carousel-dot active"></div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="right-header">
      <h1 id="authTitle">Create an account</h1>
      <p>Already have an account? <a href="#" id="switchLink">Log in</a></p>
    </div>

    <div class="auth-tabs">
      <button id="tabLogin" type="button">Log in</button>
      <button id="tabSignup" class="active" type="button">Sign up</button>
    </div>

    <div class="auth-error" id="authError"></div>

    <!-- Sign Up Form -->
    <form class="auth-form" id="signupForm" onsubmit="return false;">
      <div class="field-group">
        <div class="field">
          <label>First name</label>
          <input type="text" id="signupFirstName" placeholder="Fletcher" required />
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="signupLastName" placeholder="Doe" />
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@company.com" autocomplete="username" required />
      </div>
      <div class="field password-wrap">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Enter your password" autocomplete="new-password" required />
        <button type="button" class="toggle-pw" data-target="signupPassword">
          <svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="signupTerms" checked />
        <label for="signupTerms" style="margin:0; cursor:pointer;">I agree to the <a href="#">Terms &amp; Conditions</a></label>
      </div>
      <button class="btn" id="signupBtn" type="button">Create account</button>
    </form>

    <!-- Log In Form -->
    <form class="auth-form hidden" id="loginForm" onsubmit="return false;">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@company.com" autocomplete="username" required />
      </div>
      <div class="field password-wrap">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required />
        <button type="button" class="toggle-pw" data-target="loginPassword">
          <svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; font-size:12.5px;">
        <div class="checkbox-row" style="margin:0;">
          <input type="checkbox" id="loginRemember" />
          <label for="loginRemember" style="margin:0; cursor:pointer;">Remember me</label>
        </div>
        <a href="#" style="color:var(--accent); text-decoration:none; font-weight:500; font-size:12.5px;">Forgot password?</a>
      </div>
      <button class="btn" id="loginBtn" type="button">Sign in</button>
    </form>

    <div class="divider">Or register with</div>

    <div class="social-row">
      <button class="social-btn" type="button">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="social-btn" type="button">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Apple
      </button>
    </div>

    <button class="conn-toggle" id="connToggle" type="button">⚙ Configure Google Sheet connection</button>
    <div class="conn-panel" id="connPanel">
      <label>Apps Script Web App URL</label>
      <input type="url" id="connUrlInput" placeholder="https://script.google.com/macros/s/XXXX/exec" />
      <button class="btn secondary" id="connSaveBtn" type="button" style="width:auto; padding:8px 14px; font-size:12.5px; margin-top:0;">Save connection</button>
    </div>
  </div>
</div>

<script>
/* ===== Tab Switching ===== */
const tabLogin = document.getElementById('tabLogin');
const tabSignup = document.getElementById('tabSignup');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
const authTitle = document.getElementById('authTitle');
const switchLink = document.getElementById('switchLink');

function showLogin(){
  tabLogin.classList.add('active');
  tabSignup.classList.remove('active');
  loginForm.classList.remove('hidden');
  signupForm.classList.add('hidden');
  authTitle.textContent = 'Welcome back';
  switchLink.textContent = 'Sign up';
  switchLink.onclick = (e) => { e.preventDefault(); showSignup(); };
  hideError();
}
function showSignup(){
  tabSignup.classList.add('active');
  tabLogin.classList.remove('active');
  signupForm.classList.remove('hidden');
  loginForm.classList.add('hidden');
  authTitle.textContent = 'Create an account';
  switchLink.textContent = 'Log in';
  switchLink.onclick = (e) => { e.preventDefault(); showLogin(); };
  hideError();
}

tabLogin.addEventListener('click', showLogin);
tabSignup.addEventListener('click', showSignup);
switchLink.addEventListener('click', (e) => {
  e.preventDefault();
  if (signupForm.classList.contains('hidden')) showSignup(); else showLogin();
});

/* ===== Password Toggle ===== */
document.querySelectorAll('.toggle-pw').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.target);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? '<svg viewBox="0 0 24 24"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>'
      : '<svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  });
});

/* ===== Connection Panel ===== */
document.getElementById('connToggle').addEventListener('click', () => {
  document.getElementById('connPanel').classList.toggle('open');
});
document.getElementById('connSaveBtn').addEventListener('click', () => {
  const url = document.getElementById('connUrlInput').value.trim();
  localStorage.setItem('crmWebAppUrl', url);
  showToast('Connection saved');
});

/* ===== Error Handling ===== */
function showError(msg){
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.add('show');
}
function hideError(){ document.getElementById('authError').classList.remove('show'); }

/* ===== Auth Actions ===== */
document.getElementById('loginBtn').addEventListener('click', async () => {
  hideError();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password){ showError('Enter your email and password.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try{
    // Replace with your actual API call
    await new Promise(r => setTimeout(r, 800));
    showToast('Welcome back!');
    // window.location.href = 'dashboard.html';
  }catch(err){ showError(err.message || 'Could not sign in'); }
  finally{ btn.disabled = false; btn.textContent = 'Sign in'; }
});

document.getElementById('signupBtn').addEventListener('click', async () => {
  hideError();
  const first = document.getElementById('signupFirstName').value.trim();
  const last = document.getElementById('signupLastName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!first || !email || !password){ showError('Fill in your name, email, and password.'); return; }
  if (password.length < 6){ showError('Password must be at least 6 characters.'); return; }
  if (!document.getElementById('signupTerms').checked){ showError('Please agree to the Terms & Conditions.'); return; }
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try{
    await new Promise(r => setTimeout(r, 800));
    showToast('Account created!');
    // window.location.href = 'dashboard.html';
  }catch(err){ showError(err.message || 'Could not create account'); }
  finally{ btn.disabled = false; btn.textContent = 'Create account'; }
});

/* ===== Enter Key ===== */
document.querySelector('.right-panel').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!signupForm.classList.contains('hidden')) document.getElementById('signupBtn').click();
  else document.getElementById('loginBtn').click();
});

/* ===== Toast ===== */
let toastTimer;
function showToast(msg){
  let t = document.getElementById('toast');
  if (!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed; bottom:22px; right:22px; background:#171C25; border:1px solid #232935; color:#E8EDF2; padding:12px 16px; border-radius:9px; font-size:13px; z-index:200; opacity:0; transform:translateY(8px); transition:all .25s; box-shadow:0 8px 24px rgba(0,0,0,.4); font-family:Inter,sans-serif;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateY(0)';
  clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; }, 3000);
}

/* ===== Carousel Dots Animation ===== */
const dots = document.querySelectorAll('.carousel-dot');
let dotIndex = 2;
setInterval(() => {
  dots.forEach(d => d.classList.remove('active'));
  dotIndex = (dotIndex + 1) % dots.length;
  dots[dotIndex].classList.add('active');
}, 4000);
</script>
</body>
</html>
